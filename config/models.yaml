# Model routing: maps a task card's taskType to a "provider/model" string.
# resolveModelRoute(taskType) looks up routing[taskType], falling back to
# routing.default when taskType is unset or unknown. No provider names
# appear in code — only here.
#
# "auto:free" is a sentinel, not a literal provider/model string: spawn_worker
# (packages/core/src/mcp/server.ts) recognizes it and resolves it at spawn
# time via packages/core/src/model-catalog/ (resolveFreeModel), which queries
# the running opencode server's live catalog (GET {baseUrl}/provider) and
# picks the newest zero-cost, tool-call-capable model from a provider that's
# actually usable on this machine (authenticated, e.g. github-copilot, or
# keyless, e.g. the built-in opencode/ Zen gateway). This is deliberately
# never a hardcoded "provider/model" string here — a pinned model goes stale
# the moment the catalog adds a newer free option or retires this one; the
# resolver re-runs on every MCP server start so it always tracks the current
# catalog. See model-catalog/index.ts's docstring for the exact filter/
# ranking rules, and opencode-client/docs-notes.md ("Model catalog /
# free-model discovery") for how this endpoint was found and verified.
#
# To pin an explicit model instead — for a specific task type, or globally —
# override with a real "provider/model" string, either per project in
# <project>/.agentic-os/config/models.yaml, or by editing this file, or by
# passing `model` explicitly to spawn_worker for a one-off call.

routing:
  default: "auto:free"

# Key into this file that budget/ swaps in once the soft cap is hit.
downgrade_on_soft_cap: "small_model"

# The cheaper model referenced by downgrade_on_soft_cap. Also "auto:free" by
# default, since the free-tier resolver already picks the cheapest possible
# (zero-cost) option — there is no cheaper fallback to downgrade to.
small_model: "auto:free"
