# Orchestrator run-level defaults: budget guardrails, replan cap, human
# gates, and worker pool sizing. Overridable per-project in
# <project>\.cohort\config\orchestrator.yaml.

budget:
  softCapUsd: 5
  hardCapUsd: 20

replan:
  maxIterations: 2

humanGates:
  planApproval: true
  preMerge: true

worker:
  maxConcurrent: 3
  timeoutMinutes: 30
  infraRetryMax: 3

worktree:
  # null = sibling of the project directory:
  # ..\<project>-agentic-worktrees\<runId>\<workerId>
  baseDir: null

# Named multi-command check suites, run via checks/runCheckSuite (wraps
# verify/runVerification per command). These are sensible defaults for a
# JS/TS target project; a real project overrides them via
# <project>\.cohort\config\orchestrator.yaml.
checks:
  suites:
    quick:
      - name: typecheck
        command: "npm run typecheck"
        timeoutMs: 120000
    full:
      - name: typecheck
        command: "npm run typecheck"
        timeoutMs: 120000
      - name: test
        command: "npm test"
        timeoutMs: 300000
  # Which suite each pipeline phase runs by default.
  usage:
    verify: quick
    integration: full
    regression: full
