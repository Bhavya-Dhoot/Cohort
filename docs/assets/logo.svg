<svg viewBox="0 0 340 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cohort logo: a central orchestrator node linked to five specialist nodes, beside the Cohort wordmark">
  <style>
    .co-text { fill: #1A1A1A; }
    .co-line { stroke: #8A8F98; stroke-width: 1.6; stroke-linecap: round; }
    .co-node { fill: #8A8F98; }
    .co-accent { fill: #0F766E; }
    .co-wordmark {
      font-family: "Geist", "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    @media (prefers-color-scheme: dark) {
      .co-text { fill: #ECECEC; }
    }
  </style>

  <g>
    <line class="co-line" x1="55" y1="60" x2="55" y2="98" />
    <line class="co-line" x1="55" y1="60" x2="28" y2="87" />
    <line class="co-line" x1="55" y1="60" x2="17" y2="60" />
    <line class="co-line" x1="55" y1="60" x2="28" y2="33" />
    <line class="co-line" x1="55" y1="60" x2="55" y2="22" />

    <circle class="co-node" cx="55" cy="98" r="6" />
    <circle class="co-node" cx="28" cy="87" r="6" />
    <circle class="co-node" cx="17" cy="60" r="6" />
    <circle class="co-node" cx="28" cy="33" r="6" />
    <circle class="co-node" cx="55" cy="22" r="6" />

    <circle class="co-accent" cx="55" cy="60" r="13" />
  </g>

  <text class="co-text co-wordmark" x="112" y="76" font-size="46">Cohort</text>
</svg>
