<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated diagram: a central orchestrator draws lines out to four numbered specialist nodes and one dashed reviewer node, which assemble once and stay in place while teal pulses show work being dispatched, reviewed, and integrated in a continuous loop">
  <style>
    .co-line { stroke: #8A8F98; stroke-width: 2; fill: none; stroke-dasharray: 155; }
    .co-node-fill { fill: #FBFBFA; }
    .co-node-stroke { stroke: #8A8F98; stroke-width: 1.8; fill: none; }
    .co-node-stroke-dashed { stroke: #8A8F98; stroke-width: 1.8; fill: none; stroke-dasharray: 3 3; }
    .co-hub { fill: #0F766E; }
    .co-dispatch { stroke: #0F766E; stroke-width: 2; fill: none; stroke-dasharray: 26 129; }
    .co-pulse { stroke: #0F766E; stroke-width: 1.6; fill: none; }
    .co-num { fill: #5B6470; font-family: "Geist Mono", "JetBrains Mono", "SF Mono", ui-monospace, monospace; font-size: 14px; }
    .co-cap { fill: #5B6470; font-family: "Geist Mono", "JetBrains Mono", "SF Mono", ui-monospace, monospace; font-size: 12px; letter-spacing: 0.02em; }
    @media (prefers-color-scheme: dark) {
      .co-node-fill { fill: #141618; }
      .co-num { fill: #B8BCC0; }
      .co-cap { fill: #B8BCC0; }
      .co-hub { fill: #2DD4BF; }
      .co-dispatch { stroke: #2DD4BF; }
      .co-pulse { stroke: #2DD4BF; }
    }

    /* rule: static outer group with the transform attribute for position, plain inner group with no transform attribute for animated transform */
    .nd, .hub-g, .pulse-g { transform-box: fill-box; transform-origin: center; }

    /* entrance, plays once, ~4s total */
    @keyframes draw { 0% { stroke-dashoffset: 155; } 100% { stroke-dashoffset: 0; } }
    @keyframes pop { 0% { opacity: 0; transform: scale(.7); } 100% { opacity: 1; transform: scale(1); } }
    .s1 { animation: draw .5s ease-out .3s both; }
    .s2 { animation: draw .5s ease-out .9s both; }
    .s3 { animation: draw .5s ease-out 1.5s both; }
    .s4 { animation: draw .5s ease-out 2.1s both; }
    .s5 { animation: draw .5s ease-out 2.7s both; }
    .n1 { animation: pop .45s ease-out .65s both; }
    .n2 { animation: pop .45s ease-out 1.25s both; }
    .n3 { animation: pop .45s ease-out 1.85s both; }
    .n4 { animation: pop .45s ease-out 2.45s both; }
    .n5 { animation: pop .45s ease-out 3.05s both; }

    /* continuous loop, infinite, 12s cycle, delayed 4s so it starts after the entrance settles */
    @keyframes dispatch {
      0%, 2% { opacity: 0; stroke-dashoffset: 155; }
      2.3% { opacity: 1; stroke-dashoffset: 155; }
      10% { opacity: 1; stroke-dashoffset: 26; }
      10.3%, 100% { opacity: 0; stroke-dashoffset: 26; }
    }
    .d1 { animation: dispatch 12s ease-in-out infinite 4s both; }
    .d2 { animation: dispatch 12s ease-in-out infinite 5.56s both; }
    .d3 { animation: dispatch 12s ease-in-out infinite 7.12s both; }
    .d4 { animation: dispatch 12s ease-in-out infinite 8.68s both; }

    @keyframes review-pulse {
      0%, 60% { opacity: 0; transform: scale(1); }
      60.3% { opacity: .6; transform: scale(1); }
      72% { opacity: 0; transform: scale(1.8); }
      100% { opacity: 0; transform: scale(1); }
    }
    .pulse-g { animation: review-pulse 12s ease-in-out infinite 4s both; }

    @keyframes beat {
      0%, 76% { transform: scale(1); }
      80% { transform: scale(1.06); }
      84%, 100% { transform: scale(1); }
    }
    .hub-g { animation: beat 12s ease-in-out infinite 4s; }

    @media (prefers-reduced-motion: reduce) {
      .s1, .s2, .s3, .s4, .s5, .n1, .n2, .n3, .n4, .n5, .d1, .d2, .d3, .d4, .pulse-g, .hub-g { animation: none !important; }
      .co-line { stroke-dashoffset: 0; }
      .nd { opacity: 1; transform: none; }
      .co-dispatch, .co-pulse { opacity: 0; }
      .hub-g { transform: none; }
    }
  </style>

  <!-- spokes: static rotated outer g for position, base line draws once, overlay dispatch dash pulses forever -->
  <g transform="translate(360,220) rotate(-90)">
    <line class="co-line s1" x1="0" y1="0" x2="155" y2="0" />
    <line class="co-dispatch d1" x1="0" y1="0" x2="155" y2="0" />
  </g>
  <g transform="translate(360,220) rotate(-18)">
    <line class="co-line s2" x1="0" y1="0" x2="155" y2="0" />
    <line class="co-dispatch d2" x1="0" y1="0" x2="155" y2="0" />
  </g>
  <g transform="translate(360,220) rotate(54)">
    <line class="co-line s3" x1="0" y1="0" x2="155" y2="0" />
    <line class="co-dispatch d3" x1="0" y1="0" x2="155" y2="0" />
  </g>
  <g transform="translate(360,220) rotate(126)">
    <line class="co-line s4" x1="0" y1="0" x2="155" y2="0" />
    <line class="co-dispatch d4" x1="0" y1="0" x2="155" y2="0" />
  </g>
  <g transform="translate(360,220) rotate(198)">
    <line class="co-line s5" x1="0" y1="0" x2="155" y2="0" />
  </g>

  <!-- specialist nodes 01-04: static outer g for position, plain inner g carries the entrance animation -->
  <g transform="translate(360,65)">
    <g class="nd n1">
      <circle class="co-node-fill co-node-stroke" r="24" />
      <text class="co-num" x="0" y="0" text-anchor="middle" dominant-baseline="central">01</text>
    </g>
  </g>
  <g transform="translate(507,172)">
    <g class="nd n2">
      <circle class="co-node-fill co-node-stroke" r="24" />
      <text class="co-num" x="0" y="0" text-anchor="middle" dominant-baseline="central">02</text>
    </g>
  </g>
  <g transform="translate(451,345)">
    <g class="nd n3">
      <circle class="co-node-fill co-node-stroke" r="24" />
      <text class="co-num" x="0" y="0" text-anchor="middle" dominant-baseline="central">03</text>
    </g>
  </g>
  <g transform="translate(269,345)">
    <g class="nd n4">
      <circle class="co-node-fill co-node-stroke" r="24" />
      <text class="co-num" x="0" y="0" text-anchor="middle" dominant-baseline="central">04</text>
    </g>
  </g>

  <!-- reviewer node, dashed to read as distinct and read-only -->
  <g transform="translate(213,172)">
    <g class="nd n5">
      <circle class="co-node-fill co-node-stroke-dashed" r="24" />
      <text class="co-num" x="0" y="0" text-anchor="middle" dominant-baseline="central">R</text>
    </g>
  </g>

  <!-- review pulse: ripple ring at the reviewer position, fires once per loop -->
  <g transform="translate(213,172)">
    <g class="pulse-g">
      <circle class="co-pulse" r="24" />
    </g>
  </g>

  <!-- orchestrator hub, always visible, gets a subtle integrate beat in the loop -->
  <g transform="translate(360,220)">
    <g class="hub-g">
      <circle class="co-hub" r="34" />
    </g>
  </g>

  <text class="co-cap" x="360" y="276" text-anchor="middle">claude code &#183; orchestrator</text>
  <text class="co-cap" x="360" y="432" text-anchor="middle">objective in &#8594; org out</text>
</svg>
